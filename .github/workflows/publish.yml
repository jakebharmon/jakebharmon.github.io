on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.2.0'

      - name: Install R Dependencies
        run: |
          install.packages(c('rmarkdown', 'knitr', 'jsonlite', 'reactable', 'htmltools'))
        shell: Rscript {0}

      # Step 1: Render the main site
      - name: Render Quarto Project
        uses: quarto-dev/quarto-actions/render@v2

      # Step 2: Render the aloha-kahuina sub-project and merge into _site
      - name: Render Aloha Kahuina
        run: |
          quarto render aloha-kahuina/
          mkdir -p _site/aloha-kahuina
          cp -r aloha-kahuina/docs/. _site/aloha-kahuina/

      # Step 3: Force deployment to gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages